# Reglas de arreglo: Marimba Guatemalteca
# Autor: (tu nombre)
# Versión: 1.0
# Descripción: Reglas para adaptar arreglos de piano/MIDI a marimba guatemalteca de concierto

meta:
  instrumento: marimba_guatemalteca
  genero: general
  descripcion: "Arreglo estándar para marimba guatemalteca de concierto, 4 voces"

voces:
  soprano:
    rango_midi: [67, 84]       # G4 - C6
    nombre_rango: "G4 - C6"
    movimiento_preferido: grados_conjuntos
    salto_maximo: 7            # semitonos (quinta justa)
  alto:
    rango_midi: [55, 72]       # G3 - C5
    nombre_rango: "G3 - C5"
    movimiento_preferido: grados_conjuntos
    salto_maximo: 7
  tenor:
    rango_midi: [43, 60]       # G2 - C4
    nombre_rango: "G2 - C4"
    movimiento_preferido: grados_conjuntos
    salto_maximo: 9
  bajo:
    rango_midi: [31, 48]       # G1 - C3
    nombre_rango: "G1 - C3"
    movimiento_preferido: grados_conjuntos
    salto_maximo: 12
    duracion_minima: 1.0       # negra
    extender_duracion: true    # llenar silencios con nota sostenida

armonizacion:
  notas_simultaneas_1:
    # Solo hay 1 nota: generar las 4 voces
    soprano: original
    alto: soprano - 3          # tercera menor abajo
    tenor: soprano - 7         # quinta justa abajo
    bajo: soprano - 12         # octava abajo

  notas_simultaneas_2:
    # 2 notas: soprano y bajo fijos, alto y tenor generados
    soprano: voz_aguda
    alto: soprano - 3
    tenor: soprano - 7
    bajo: voz_grave

  notas_simultaneas_3:
    # 3 notas: soprano, alto, bajo directos; tenor generado
    soprano: voz_1
    alto: voz_2
    tenor: alto - 5            # cuarta justa abajo del alto
    bajo: voz_3

  notas_simultaneas_4_o_mas:
    # 4+ notas: asignar por registro agudo→grave
    asignacion: registro_directo

restricciones:
  evitar_cruce_voces: true
  evitar_quintas_paralelas: true
  bajo_sostenido: true
  notas_de_paso_en_saltos_grandes: true
  umbral_salto_nota_de_paso: 12  # semitonos

procesamiento:
  snap_grid: 0.25              # semicorchea
  duracion_minima_nota: 0.25
  tolerancia_simultaneidad: 0.05  # segundos
