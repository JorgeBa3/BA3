# ═══════════════════════════════════════════════════════════════════
# PERFIL: Marimba Guatemalteca de Concierto
# BA³ — Motor de Reglas YAML
# ═══════════════════════════════════════════════════════════════════
# USO: Cargar este archivo en la app con el botón "Cargar"
# COMPATIBLE CON: rule_engine.py v2+
# ═══════════════════════════════════════════════════════════════════

meta:
  instrumento: "Marimba Guatemalteca"
  descripcion: "Arreglo estándar para marimba guatemalteca de concierto, 4 voces"
  autor: ""
  version: "2.0"
  genero: "general"

# ───────────────────────────────────────────────────────────────────
# VOCES
# IMPORTANTE: Nombres con mayúscula inicial — reconocidos como
# Marimba por el exporter. NO usar "alto"/"tenor" en minúscula
# porque mapean a AltoSaxophone/TenorSaxophone.
# ───────────────────────────────────────────────────────────────────
voces:
  Soprano:
    rango_midi: [67, 84]
    nombre_rango: "G4 - C6"
    duracion_minima: 0.25

  Alto:
    rango_midi: [55, 72]
    nombre_rango: "G3 - C5"
    duracion_minima: 0.25

  Tenor:
    rango_midi: [43, 60]
    nombre_rango: "G2 - C4"
    duracion_minima: 0.25

  Bajo:
    rango_midi: [31, 48]
    nombre_rango: "G1 - C3"
    duracion_minima: 1.0
    extender_duracion: true

armonizacion:

  notas_simultaneas_1:
    Soprano: original
    Alto:    Soprano - 3
    Tenor:   Soprano - 7
    Bajo:    Soprano - 12

  notas_simultaneas_2:
    Soprano: voz_aguda
    Alto:    Soprano - 3
    Tenor:   Soprano - 7
    Bajo:    voz_grave

  notas_simultaneas_3:
    Soprano: voz_1
    Alto:    voz_2
    Tenor:   Alto - 5
    Bajo:    voz_3

restricciones:
  bajo_sostenido: true
  notas_de_paso_en_saltos_grandes: true
  umbral_salto_nota_de_paso: 12

procesamiento:
  snap_grid: 0.25
  duracion_minima_nota: 0.25
  tolerancia_simultaneidad: 0.05